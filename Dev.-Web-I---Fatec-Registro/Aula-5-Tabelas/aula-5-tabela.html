<main> 
    <h1>Tabela com atributo SCOPE</h1>   
    <table> border="1">
        <caption>Notas dos Alunos</caption>
        <thead>
            <tr>
                <th scope="col">Aluno</th>
                <th scope="col">Desenvolvimento Web</th>
                <th scope="col">Design Digital</th>
                <th scope="col">Banco de Dados</th>
                <th scope="col">Algoritmos</th>
            </tr>
        </thead>
         <tbody>
            <tr>
                <th scope="row">Ana</th>
                <td>8.5</td>
                <td>7.0</td>
                <td>9.0</td>
                <td>8.0</td>
            </tr>
            <tr>
                <th scope="row">Bruno</th>
                <td>7.0</td>
                <td>8.5</td>
                <td>6.0</td>
                <td>7.5</td>
            </tr>
         </tbody>

    </table>
<!-- O scope serve para atribuir um papel específico às células do cabeçalho, melhorando a acessibilidade e a semântica da tabela -->
 <!-- Estudar tabelas no HTML5, com estrutura semântica, utilizando as tags thead, tbody e tfoot, para organizar melhor a tabela e melhorar a acessibilidade.
   -->
