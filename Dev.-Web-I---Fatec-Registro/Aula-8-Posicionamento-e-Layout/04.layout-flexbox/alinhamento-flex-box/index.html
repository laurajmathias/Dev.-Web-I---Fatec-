<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box - Direção e Alinhamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Flex Box - Direção e Alinhamento</h2>

    <p>Linha aocentro</p>
    <div class="container-flex row-center">
        <div class="card">A</div>
        <div class="card">B</div>
        <div class="card">C</div>
    </div>

    <p>Coluna à esquerda</p>

<div class="container-flex column-left">
        <div class="card">A</div>
        <div class="card">B</div>
        <div class="card">C</div>
    </div> 


    <p>Linha espaçada (SPACE BETWEEN)</p>
    
<div class="container-flex spaced">
        <div class="card">A</div>
        <div class="card">B</div>
        <div class="card">C</div>
    </div> 
<!-- Aqui, ele automatiza o espaçamento de acordo com o espaço disponível -->

<p>Quebra de linha (wrap)</p>
    
<div class="container-flex wrap">
        <div class="card">A</div>
        <div class="card">B</div>
        <div class="card">C</div>
    
        <div class="card">D</div>
        <div class="card">E</div>
        <div class="card">F</div>
            <div class="card">G</div>
        <div class="card">B</div>
        <div class="card">H</div>
            <div class="card">I</div>
        <div class="card">J</div>
        <div class="card">L</div>
        
    </div>  


</body>
</html>
