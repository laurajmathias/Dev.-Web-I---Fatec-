<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras mídias HtML 5</title>

</head>
<body>
<header>
    <h1>Outras midias HTML 5</h1>
<main>
    <section>
        <h2>audio</h2> 
        <!-- o comando src significa source/fonte da mídia -->
         <!-- o controls faz ele criar um player -->
          <!-- width e heigth= largura e altura -->
        <audio controls src="midias/audio.mp3"></audio>
        
        <h2><video controls src="midias/video.mp4" type="video/mp4" width="300" height="200">
             Video não rodado ou não suportado
        </video></h2>
            
<!-- Vídeo do Youtube/Externo = iframe -->
 <h2>Vídeo do Youtube</h2>
 <iframe 
 src="https://www.youtube.com/embed/3g6WChxXoQ" 
 title="Exemplo vídeo incorporado"
 width="560px
 height="315px"
 frameborder="0"></iframe>





    </main>
</header>    
</body>
</html>
